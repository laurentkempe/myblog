name: Deploy to GitHub Pages

on:
  
  push:
    branches: [ main ] # Trigger the workflow every time you push to the `main` branch
  
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab on GitHub.

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust for docfind
        uses: dtolnay/rust-toolchain@stable

      - name: Cache docfind binary
        id: cache-docfind
        uses: actions/cache@v4
        with:
          path: scripts/docfind
          key: ${{ runner.os }}-docfind-0.5.1

      - name: Build docfind from source
        if: steps.cache-docfind.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/microsoft/docfind.git /tmp/docfind
          cd /tmp/docfind
          echo '[package.metadata.wasm-pack.profile.release]' >> wasm/Cargo.toml
          echo 'wasm-opt = false' >> wasm/Cargo.toml
          cargo build --release -p docfind
          cp target/release/docfind ${{ github.workspace }}/scripts/docfind
          chmod +x ${{ github.workspace }}/scripts/docfind

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          package-manager: pnpm@latest

  deploy:
    needs: build
    permissions:
      pages: write       # to deploy to Pages
      id-token: write    # to verify the deployment originates from an appropriate source
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages          
      - name: Display structure of downloaded files
        run: ls -R
      - name: Create dist directory
        run: mkdir -p ./dist
      - name: Extract artifact
        run: tar -xvf ./artifact.tar -C ./dist
      - name: Deploy to GitHub Pages on external repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: laurentkempe/techheadbrothers
          publish_branch: main
          publish_dir: dist